{% extends 'base.html' %}

{% block content %}
<h3>Edit Item</h3>
<form method="post">
    Name
    <input type="text" name="name" value="{{ movie.title }}">
    Year
    <input type="text" name="year" value="{{ movie.year }}" size="6">
    <input type="submit" value="Update" class="btn">
</form>
{% endblock %}
