{% extends 'base.html' %}

{% block content %}
<p>{{ movies|length }} Titles</p>
<ul class="movie-list">
    {% for movie in movies %}
    <li>
        {{ movie.title }} - {{ movie.year }}
        <span class="float-right">
            <!-- class="imdb" 匹配css黄色按钮 -->
            <a class="imdb" target="_blank" href="https://www.imdb.com/find?q={{ movie.title }}">IMDb</a>
        </span>
    </li>
    {% endfor %}
</ul>
{% endblock %}
